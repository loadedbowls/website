<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07111d">
    <link rel="manifest" href="/manifest.json">
    <title>Loaded Bowls | Mobiele orders</title>
    <style>
      :root {
        --bg: #07111d;
        --panel: #111b26;
        --panel-2: #172333;
        --text: #fff6e2;
        --muted: #cabd9f;
        --gold: #f2b231;
        --orange: #f28a2d;
        --line: rgba(242, 178, 49, 0.28);
        --ok: #70d98d;
        --danger: #ff806b;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 88% -10%, rgba(242, 138, 45, 0.18), transparent 34%),
          linear-gradient(180deg, #07111d, #050b12);
        color: var(--text);
      }

      button, input { font: inherit; }

      .app {
        width: min(720px, 100%);
        margin: 0 auto;
        padding: 16px;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 5;
        margin: -16px -16px 16px;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: rgba(7, 17, 29, 0.95);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(12px);
      }

      .brand { display: flex; align-items: center; gap: 10px; }
      .brand img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }

      h1, h2, h3, p { margin: 0; }

      h1 {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 32px;
        line-height: 0.95;
        text-transform: uppercase;
      }

      h1 span, h2, .accent { color: var(--gold); }

      .panel, .order {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(17, 27, 38, 0.96);
        box-shadow: 0 16px 44px rgba(0,0,0,0.25);
      }

      .panel { padding: 14px; display: grid; gap: 12px; margin-bottom: 14px; }

      label { display: grid; gap: 6px; color: var(--muted); font-size: 13px; font-weight: 800; }
      input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #07111d;
        color: var(--text);
      }

      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .actions { display: flex; flex-wrap: wrap; gap: 9px; }

      button, .button-link {
        border: 0;
        border-radius: 10px;
        padding: 11px 13px;
        background: var(--gold);
        color: #140d05;
        font-weight: 900;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary, .button-link.secondary {
        background: #1b2837;
        color: var(--text);
        border: 1px solid var(--line);
      }

      button.green {
        background: var(--ok);
      }

      button.blue {
        background: #7ab7ff;
      }

      .small { font-size: 12px; color: var(--muted); line-height: 1.45; }
      .error { color: var(--danger); }
      .ok { color: var(--ok); }
      .hidden { display: none !important; }

      .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
      .tab { white-space: nowrap; background: #1b2837; color: var(--text); border: 1px solid var(--line); }
      .tab.active { background: var(--gold); color: #140d05; }
      .view-actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .view-actions button.active { background: var(--gold); color: #140d05; }

      .orders { display: grid; gap: 12px; }
      .order { padding: 14px; display: grid; gap: 10px; }
      .order-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
      .order h3 { font-size: 19px; }
      .pill { display: inline-flex; align-items: center; padding: 6px 9px; border-radius: 999px; background: #2a2317; color: var(--gold); font-size: 12px; font-weight: 900; }
      .meta { color: var(--muted); font-size: 13px; line-height: 1.5; }
      .items { white-space: pre-line; font-size: 14px; line-height: 1.45; }
      .total { font-weight: 950; color: var(--gold); }

      @media (max-width: 520px) {
        .row { grid-template-columns: 1fr; }
        header { align-items: flex-start; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div class="brand">
          <img src="/assets/loaded-bowls-logo.jpeg" alt="">
          <div>
            <h1>Orders <span>gsm</span></h1>
            <p class="small">Loaded Bowls intern</p>
          </div>
        </div>
        <span class="pill" id="count">0</span>
      </header>

      <section class="panel" id="loginPanel">
        <h2>Toegang</h2>
        <label>
          Geheime code
          <input id="secretInput" type="password" autocomplete="current-password" placeholder="ADMIN_ORDERS_SECRET">
        </label>
        <div class="actions">
          <button id="saveSecret" type="button">Open orders</button>
          <button class="secondary" id="clearSecret" type="button">Code wissen</button>
        </div>
        <p class="small">Gebruik dezelfde code als in Vercel bij <strong>ADMIN_ORDERS_SECRET</strong>.</p>
      </section>

      <section class="panel hidden" id="pushPanel">
        <h2>Meldingen</h2>
        <p class="small" id="pushStatus">Voeg deze pagina toe aan je beginscherm en activeer daarna meldingen.</p>
        <div class="actions">
          <button id="enablePush" type="button">Meldingen activeren</button>
          <button class="secondary" id="refresh" type="button">Vernieuw</button>
        </div>
      </section>

      <section class="panel hidden" id="ordersPanel">
        <div class="view-actions">
          <button class="active" id="activeView" type="button">Actieve orders</button>
          <button class="secondary" id="historyView" type="button">Bestelgeschiedenis</button>
        </div>
        <div class="tabs" id="tabs"></div>
        <div class="orders" id="orders"></div>
      </section>

      <p class="small error" id="error"></p>
    </main>

    <script>
      const statuses = ["Nieuw", "In bereiding", "Klaar", "Onderweg"];
      const historyStatuses = ["Afgehaald", "Geleverd"];
      const secretInput = document.querySelector("#secretInput");
      const loginPanel = document.querySelector("#loginPanel");
      const pushPanel = document.querySelector("#pushPanel");
      const ordersPanel = document.querySelector("#ordersPanel");
      const pushStatus = document.querySelector("#pushStatus");
      const ordersEl = document.querySelector("#orders");
      const tabsEl = document.querySelector("#tabs");
      const countEl = document.querySelector("#count");
      const errorEl = document.querySelector("#error");
      const activeViewButton = document.querySelector("#activeView");
      const historyViewButton = document.querySelector("#historyView");
      const PUSH_ENABLED_KEY = "loadedBowlsPushEnabled";
      let activeStatus = "Nieuw";
      let viewMode = "active";
      let orders = [];
      let drivers = [];

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[char]));
      }

      function money(value) {
        return "€" + Number(value || 0).toFixed(2).replace(".", ",");
      }

      function statusGroup(record) {
        const status = record.status || "Nieuw";
        return historyStatuses.includes(status) ? "Bestelgeschiedenis" : status;
      }

      function isTestOrder(record) {
        const order = record.order || {};
        const customer = order.customer || {};
        const haystack = [
          record.id,
          record.paymentLabel,
          record.paymentStatus,
          customer.name,
          customer.email,
          customer.phone,
          customer.note
        ].join(" ").toLowerCase();
        return haystack.includes("test");
      }

      function isHistoryOrder(record) {
        return historyStatuses.includes(record.status) || isTestOrder(record);
      }

      function getSecret() {
        return localStorage.getItem("loadedBowlsMobileSecret") || "";
      }

      function setError(message = "") {
        errorEl.textContent = message;
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
        const rawData = atob(base64);
        return Uint8Array.from([...rawData].map(char => char.charCodeAt(0)));
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            ...(options.headers || {}),
            "x-admin-secret": getSecret()
          }
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Er ging iets mis.");
        return data;
      }

      function showApp() {
        const hasSecret = Boolean(getSecret());
        loginPanel.classList.toggle("hidden", hasSecret);
        pushPanel.classList.toggle("hidden", !hasSecret);
        ordersPanel.classList.toggle("hidden", !hasSecret);
        if (hasSecret) {
          refreshOrders();
          checkSavedPush();
        }
      }

      function renderTabs() {
        tabsEl.classList.toggle("hidden", viewMode === "history");
        activeViewButton.classList.toggle("active", viewMode === "active");
        activeViewButton.classList.toggle("secondary", viewMode !== "active");
        historyViewButton.classList.toggle("active", viewMode === "history");
        historyViewButton.classList.toggle("secondary", viewMode !== "history");
        tabsEl.innerHTML = statuses.map(status => {
          const total = orders.filter(order => !isHistoryOrder(order) && statusGroup(order) === status).length;
          return `<button class="tab ${status === activeStatus ? "active" : ""}" type="button" data-tab="${escapeHtml(status)}">${escapeHtml(status)} (${total})</button>`;
        }).join("");
      }

      function mapsLink(address) {
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
      }

      function wazeLink(address) {
        return `https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`;
      }

      function statusButtons(record) {
        const status = record.status || "Nieuw";
        const method = record.order?.customer?.method || "";
        const buttons = [];

        if (status === "Nieuw") {
          buttons.push(`<button class="blue" type="button" data-status="In bereiding" data-id="${escapeHtml(record.id)}">In bereiding</button>`);
        }

        if (status === "In bereiding") {
          const nextStatus = method === "Levering" ? "Onderweg" : "Klaar";
          buttons.push(`<button class="green" type="button" data-status="${escapeHtml(nextStatus)}" data-id="${escapeHtml(record.id)}" data-method="${escapeHtml(method)}">${escapeHtml(nextStatus)}</button>`);
        }

        if (status === "Klaar") {
          buttons.push(`<button class="secondary" type="button" data-status="Afgehaald" data-id="${escapeHtml(record.id)}">Afgehaald</button>`);
        }

        if (status === "Onderweg") {
          buttons.push(`<button class="secondary" type="button" data-status="Geleverd" data-id="${escapeHtml(record.id)}">Geleverd</button>`);
        }

        return buttons.join("");
      }

      function renderOrders() {
        renderTabs();
        const filtered = viewMode === "history"
          ? orders.filter(order => isHistoryOrder(order))
          : orders.filter(order => !isHistoryOrder(order) && statusGroup(order) === activeStatus);
        countEl.textContent = orders.length;
        if (!filtered.length) {
          ordersEl.innerHTML = `<article class="order"><p class="meta">Geen orders in ${escapeHtml(viewMode === "history" ? "Bestelgeschiedenis" : activeStatus)}.</p></article>`;
          return;
        }

        ordersEl.innerHTML = filtered.map(record => {
          const order = record.order || {};
          const customer = order.customer || {};
          const items = Array.isArray(order.items) ? order.items : [];
          const address = customer.address || "";
          const number = record.displayOrderNumber || record.localOrderNumber || record.id || "-";
          const total = order.total || record.amount?.value || 0;
          const routeButtons = customer.method === "Levering" && address
            ? `<a class="button-link" href="${wazeLink(address)}" target="_blank" rel="noreferrer">Waze</a><a class="button-link secondary" href="${mapsLink(address)}" target="_blank" rel="noreferrer">Maps</a>`
            : "";
          const actionButtons = [statusButtons(record), routeButtons].filter(Boolean).join("");

          return `
            <article class="order">
              <div class="order-top">
                <div>
                  <h3>${escapeHtml(number)}</h3>
                  <p class="meta">${escapeHtml(customer.name || "Klant")} · ${escapeHtml(customer.method || "-")} · ${escapeHtml(customer.orderTime || "-")}</p>
                </div>
                <span class="pill">${escapeHtml(isTestOrder(record) ? "Testorder" : (record.status || "Nieuw"))}</span>
              </div>
              <p class="meta">
                Tel: <a href="tel:${escapeHtml(customer.phone || "")}" style="color:var(--gold)">${escapeHtml(customer.phone || "-")}</a><br>
                ${customer.email ? `Mail: ${escapeHtml(customer.email)}<br>` : ""}
                ${address ? `Adres: ${escapeHtml(address)}<br>` : ""}
                ${record.driverName ? `Bezorger: ${escapeHtml(record.driverName)}<br>` : ""}
                ${customer.note ? `Opmerking: ${escapeHtml(customer.note)}` : ""}
              </p>
              <div class="items">${items.map(item => `${escapeHtml(item.quantity || 1)}x ${escapeHtml(item.name || "Item")}\\n${escapeHtml(item.details || "")}`).join("\\n\\n")}</div>
              <p class="total">Totaal: ${money(total)}</p>
              <div class="actions">${actionButtons}</div>
            </article>
          `;
        }).join("");
      }

      async function updateStatus(id, status, extra = {}) {
        await api("/api/orders", {
          method: "PATCH",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id, status, ...extra })
        });
      }

      async function loadDrivers() {
        const data = await api("/api/drivers");
        drivers = data.drivers || [];
        return drivers;
      }

      async function chooseDriver() {
        await loadDrivers();
        const activeDrivers = drivers.filter(driver => driver.active !== false);
        if (!activeDrivers.length) throw new Error("Voeg eerst een bezorger toe via de laptop-orderapp.");
        const list = activeDrivers.map((driver, index) => `${index + 1}. ${driver.name}`).join("\n");
        const answer = prompt(`Welke bezorger?\n\n${list}`);
        const index = Number(answer) - 1;
        const driver = activeDrivers[index];
        if (!driver) throw new Error("Geen geldige bezorger gekozen.");
        return driver;
      }

      async function refreshOrders() {
        try {
          setError("");
          const data = await api("/api/orders");
          orders = (data.orders || []).sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
          renderOrders();
        } catch (error) {
          setError(error.message);
        }
      }

      async function saveSubscription(subscription) {
        await api("/api/push-subscribe", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ subscription })
        });
        localStorage.setItem(PUSH_ENABLED_KEY, "1");
        pushStatus.textContent = "Meldingen staan aan op deze gsm.";
        pushStatus.classList.add("ok");
        document.querySelector("#enablePush").textContent = "Meldingen staan aan";
      }

      async function getPushRegistration() {
        const registration = await navigator.serviceWorker.register("/service-worker.js");
        return registration;
      }

      async function ensurePushSubscription({ askPermission = false } = {}) {
        if (!("Notification" in window) || !("serviceWorker" in navigator) || !("PushManager" in window)) {
          throw new Error("Pushmeldingen worden niet ondersteund op deze browser.");
        }

        if (Notification.permission === "denied") {
          localStorage.removeItem(PUSH_ENABLED_KEY);
          throw new Error("Meldingen zijn geblokkeerd. Zet ze aan in de instellingen van je browser/gsm.");
        }

        if (askPermission && Notification.permission !== "granted") {
          const permission = await Notification.requestPermission();
          if (permission !== "granted") throw new Error("Meldingen zijn niet toegestaan.");
        }

        if (Notification.permission !== "granted") {
          pushStatus.textContent = "Meldingen zijn nog niet actief op deze gsm.";
          pushStatus.classList.remove("ok");
          document.querySelector("#enablePush").textContent = "Meldingen activeren";
          return null;
        }

        const keyData = await api("/api/push-public-key");
        if (!keyData.publicKey) {
          throw new Error("VAPID_PUBLIC_KEY ontbreekt nog in Vercel.");
        }

        const registration = await getPushRegistration();
        let subscription = await registration.pushManager.getSubscription();
        if (!subscription) {
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
          });
        }

        await saveSubscription(subscription);
        return subscription;
      }

      async function checkSavedPush() {
        if (!("Notification" in window)) return;
        if (Notification.permission === "granted" || localStorage.getItem(PUSH_ENABLED_KEY) === "1") {
          try {
            await ensurePushSubscription({ askPermission: false });
          } catch (error) {
            pushStatus.classList.remove("ok");
            pushStatus.textContent = "Meldingen opnieuw verbinden lukte niet. Druk eenmalig op activeren.";
          }
          return;
        }
        pushStatus.textContent = "Voeg deze pagina toe aan je beginscherm en activeer daarna meldingen.";
        pushStatus.classList.remove("ok");
      }

      async function registerPush() {
        try {
          setError("");
          await ensurePushSubscription({ askPermission: true });
        } catch (error) {
          pushStatus.classList.remove("ok");
          setError(error.message);
        }
      }

      document.querySelector("#saveSecret").addEventListener("click", () => {
        localStorage.setItem("loadedBowlsMobileSecret", secretInput.value.trim());
        showApp();
      });

      document.querySelector("#clearSecret").addEventListener("click", () => {
        localStorage.removeItem("loadedBowlsMobileSecret");
        secretInput.value = "";
        showApp();
      });

      document.querySelector("#enablePush").addEventListener("click", registerPush);
      document.querySelector("#refresh").addEventListener("click", refreshOrders);
      activeViewButton.addEventListener("click", () => {
        viewMode = "active";
        renderOrders();
      });
      historyViewButton.addEventListener("click", () => {
        viewMode = "history";
        renderOrders();
      });
      tabsEl.addEventListener("click", event => {
        const button = event.target.closest("[data-tab]");
        if (!button) return;
        activeStatus = button.dataset.tab;
        renderOrders();
      });

      ordersEl.addEventListener("click", async event => {
        const button = event.target.closest("[data-status]");
        if (!button) return;
        try {
          setError("");
          let extra = {};
          if (button.dataset.status === "Onderweg" && button.dataset.method === "Levering") {
            const driver = await chooseDriver();
            extra = { driverId: driver.id, driverName: driver.name };
          }
          await updateStatus(button.dataset.id, button.dataset.status, extra);
          if (historyStatuses.includes(button.dataset.status)) {
            viewMode = "history";
          } else {
            viewMode = "active";
            activeStatus = button.dataset.status;
          }
          await refreshOrders();
        } catch (error) {
          setError(error.message);
        }
      });

      secretInput.value = getSecret();
      showApp();
      setInterval(() => {
        if (getSecret()) refreshOrders();
      }, 12000);
    </script>
  </body>
</html>
