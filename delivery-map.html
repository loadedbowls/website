<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#07111d">
    <title>Loaded Bowls Live Kaart</title>
    <style>
      :root {
        --bg: #07111d;
        --panel: #101923;
        --text: #fff6e2;
        --muted: #cdbf9f;
        --gold: #f2b231;
        --line: rgba(242, 178, 49, 0.26);
        --new: #f2b231;
        --prep: #4ea1ff;
        --ready: #f28a2d;
        --road: #8a6cff;
        --driver: #65d98b;
        --danger: #e8664e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 15% 0%, rgba(242, 178, 49, 0.12), transparent 30%),
          linear-gradient(180deg, #07111d, #050b12);
        color: var(--text);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(1280px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 14px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
      }

      .top,
      .login {
        background: rgba(16, 25, 35, 0.92);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: clamp(34px, 7vw, 68px);
        line-height: 0.9;
        text-transform: uppercase;
      }

      h1 span {
        color: var(--gold);
      }

      .muted {
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .zoom-controls {
        position: absolute;
        right: 16px;
        bottom: 78px;
        z-index: 8;
        display: grid;
        gap: 7px;
      }

      .zoom-controls button,
      .zoom-level {
        width: 44px;
        min-height: 38px;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 12px;
        background: rgba(5, 11, 18, 0.9);
        color: var(--text);
        font-weight: 950;
        text-align: center;
      }

      .zoom-level {
        display: grid;
        place-items: center;
        color: var(--gold);
        font-size: 12px;
      }

      .btn {
        border: 0;
        border-radius: 12px;
        padding: 11px 13px;
        background: var(--gold);
        color: #100b05;
        font-weight: 950;
        cursor: pointer;
      }

      .btn.secondary {
        background: #172231;
        color: var(--text);
        border: 1px solid var(--line);
      }

      input {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px 12px;
        background: #07111d;
        color: var(--text);
      }

      .hidden {
        display: none !important;
      }

      .login {
        align-self: start;
        display: grid;
        gap: 12px;
      }

      .error {
        color: var(--danger);
      }

      .map {
        position: relative;
        min-height: 70vh;
        overflow: hidden;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: #d9e0d3;
      }

      .map::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 50%, transparent 0 44%, rgba(7, 17, 29, 0.08) 70%),
          linear-gradient(180deg, rgba(7, 17, 29, 0.04), rgba(7, 17, 29, 0.18));
      }

      .tile-layer {
        position: absolute;
        inset: 0;
        z-index: 0;
        overflow: hidden;
      }

      .tile-layer img {
        position: absolute;
        width: 256px;
        height: 256px;
        user-select: none;
      }

      .legend {
        position: absolute;
        left: 16px;
        bottom: 16px;
        z-index: 8;
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        max-width: calc(100% - 32px);
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,.1);
        background: rgba(5, 11, 18, 0.88);
        backdrop-filter: blur(10px);
      }

      .legend span {
        display: flex;
        gap: 7px;
        align-items: center;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .swatch {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--color);
      }

      .summary {
        position: absolute;
        right: 16px;
        top: 16px;
        z-index: 8;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,.1);
        background: rgba(5, 11, 18, 0.88);
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
      }

      .shop {
        position: absolute;
        left: 50%;
        top: 50%;
        z-index: 4;
        transform: translate(-50%, -50%);
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 999px;
        border: 2px solid var(--gold);
        background: #0e1015;
        color: var(--gold);
        font-weight: 950;
        font-size: 9px;
        line-height: 1.05;
        text-align: center;
        box-shadow: 0 0 0 6px rgba(242, 178, 49, 0.08);
      }

      .radius {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(80%, 780px);
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border: 1px dashed rgba(242, 178, 49, 0.35);
        border-radius: 999px;
        pointer-events: none;
      }

      .pin {
        --pin: var(--new);
        position: absolute;
        left: var(--x);
        top: var(--y);
        z-index: 5;
        transform: translate(-50%, -100%);
        border: 0;
        background: transparent;
        color: var(--text);
        pointer-events: none;
      }

      .pin-dot {
        display: block;
        width: 28px;
        height: 28px;
        border-radius: 999px 999px 999px 4px;
        rotate: -45deg;
        background: var(--pin);
        box-shadow: 0 0 0 7px color-mix(in srgb, var(--pin) 22%, transparent);
      }

      .pin-label {
        position: absolute;
        left: 26px;
        top: -34px;
        min-width: 98px;
        padding: 6px 8px;
        border-radius: 10px;
        background: rgba(5, 11, 18, 0.9);
        border: 1px solid rgba(255,255,255,.12);
        font-size: 12px;
        font-weight: 900;
        text-align: left;
        white-space: nowrap;
      }

      .driver-pin {
        --pin: var(--driver);
        z-index: 6;
      }

      .driver-pin .pin-dot {
        border-radius: 999px;
        rotate: 0deg;
        border: 3px solid #fff6e2;
      }

      @media (max-width: 640px) {
        .app { padding: 10px; }
        .top { align-items: flex-start; }
        .map { min-height: 78vh; }
        .summary {
          left: 12px;
          right: 12px;
          top: 12px;
        }
        .legend {
          left: 12px;
          right: 12px;
          bottom: 12px;
        }
        .zoom-controls {
          right: 12px;
          bottom: 96px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div>
          <h1>Live <span>Kaart</span></h1>
          <p class="muted">Alleen kaartweergave voor leveringen en chauffeurs.</p>
        </div>
        <button class="btn" id="refreshButton" type="button">Vernieuwen</button>
      </header>

      <section class="login" id="loginPanel">
        <strong>Toegang</strong>
        <p class="muted">Gebruik jullie interne code om de kaart te openen.</p>
        <div class="actions">
          <input id="secretInput" type="password" placeholder="Ordercode">
          <button class="btn" id="saveSecretButton" type="button">Kaart openen</button>
        </div>
        <p class="error" id="error"></p>
      </section>

      <section class="map hidden" id="map">
        <div class="tile-layer" id="tileLayer" aria-hidden="true"></div>
        <div class="radius" aria-hidden="true"></div>
        <div class="shop">Loaded<br>Bowls</div>
        <div class="summary" id="summary">Nog niet geladen</div>
        <div class="zoom-controls" aria-label="Kaart zoom">
          <button id="zoomInButton" type="button">+</button>
          <span class="zoom-level" id="zoomLevel">14</span>
          <button id="zoomOutButton" type="button">-</button>
        </div>
        <div class="legend">
          <span><i class="swatch" style="--color: var(--new)"></i>Nieuw</span>
          <span><i class="swatch" style="--color: var(--prep)"></i>In bereiding</span>
          <span><i class="swatch" style="--color: var(--ready)"></i>Klaar</span>
          <span><i class="swatch" style="--color: var(--road)"></i>Onderweg</span>
          <span><i class="swatch" style="--color: var(--driver)"></i>Chauffeur</span>
        </div>
      </section>
    </main>

    <script>
      const apiBase = location.protocol === "file:" ? "https://loadedbowls.be" : "";
      const shop = { lat: 51.0461, lng: 3.7248 };
      const activeStatuses = ["Nieuw", "In bereiding", "Klaar", "Onderweg"];
      const statusColors = {
        "Nieuw": "var(--new)",
        "In bereiding": "var(--prep)",
        "Klaar": "var(--ready)",
        "Onderweg": "var(--road)"
      };

      const mapEl = document.querySelector("#map");
      const tileLayer = document.querySelector("#tileLayer");
      const loginPanel = document.querySelector("#loginPanel");
      const secretInput = document.querySelector("#secretInput");
      const errorEl = document.querySelector("#error");
      const summaryEl = document.querySelector("#summary");
      const zoomLevelEl = document.querySelector("#zoomLevel");
      const zoomInButton = document.querySelector("#zoomInButton");
      const zoomOutButton = document.querySelector("#zoomOutButton");

      let orders = [];
      let locations = {};
      let mapZoom = Number(localStorage.getItem("loadedMapZoom") || 14);
      const geocodeCache = JSON.parse(localStorage.getItem("loadedMapGeocodeCache") || "{}");

      function lonToTileX(lon, zoom) {
        return ((lon + 180) / 360) * 2 ** zoom;
      }

      function latToTileY(lat, zoom) {
        const rad = lat * Math.PI / 180;
        return (1 - Math.log(Math.tan(rad) + 1 / Math.cos(rad)) / Math.PI) / 2 * 2 ** zoom;
      }

      function renderTiles() {
        const zoom = mapZoom;
        const rect = mapEl.getBoundingClientRect();
        const centerX = lonToTileX(shop.lng, zoom);
        const centerY = latToTileY(shop.lat, zoom);
        const tileX = Math.floor(centerX);
        const tileY = Math.floor(centerY);
        const tilesX = Math.ceil(rect.width / 256) + 2;
        const tilesY = Math.ceil(rect.height / 256) + 2;
        const startX = tileX - Math.ceil(tilesX / 2);
        const startY = tileY - Math.ceil(tilesY / 2);
        const offsetX = rect.width / 2 - (centerX - startX) * 256;
        const offsetY = rect.height / 2 - (centerY - startY) * 256;

        tileLayer.innerHTML = "";
        for (let x = 0; x < tilesX; x += 1) {
          for (let y = 0; y < tilesY; y += 1) {
            const img = document.createElement("img");
            img.alt = "";
            img.decoding = "async";
            img.loading = "lazy";
            img.src = `https://tile.openstreetmap.org/${zoom}/${startX + x}/${startY + y}.png`;
            img.style.left = `${offsetX + x * 256}px`;
            img.style.top = `${offsetY + y * 256}px`;
            tileLayer.appendChild(img);
          }
        }
        if (zoomLevelEl) zoomLevelEl.textContent = String(zoom);
      }

      function escapeHtml(value = "") {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function getSecret() {
        return localStorage.getItem("loadedOrdersSecret") || "";
      }

      function setSecret(value) {
        localStorage.setItem("loadedOrdersSecret", value);
      }

      async function api(path) {
        let response;
        try {
          response = await fetch(`${apiBase}${path}`, {
            headers: { "x-admin-secret": getSecret() }
          });
        } catch {
          throw new Error(`${path} niet bereikbaar. Upload ook de api-bestanden en redeploy.`);
        }
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || `${path} gaf fout ${response.status}.`);
        return data;
      }

      function orderNumber(record) {
        return record.displayOrderNumber || record.order?.orderNumber || record.order?.orderId || record.id || "Order";
      }

      function customer(record) {
        return record.order?.customer || {};
      }

      function orderAddress(record) {
        return customer(record).address || "";
      }

      function saveGeocodeCache() {
        localStorage.setItem("loadedMapGeocodeCache", JSON.stringify(geocodeCache));
      }

      function cleanAddress(address = "") {
        const value = String(address || "").trim();
        if (!value) return "";
        if (/gent/i.test(value)) return `${value}, Belgium`;
        return `${value}, Gent, Belgium`;
      }

      async function geocodeAddress(address) {
        const query = cleanAddress(address);
        if (!query) return null;
        const cacheKey = query.toLowerCase();
        if (geocodeCache[cacheKey]) return geocodeCache[cacheKey];

        try {
          const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=be&q=${encodeURIComponent(query)}`);
          const results = await response.json();
          const first = Array.isArray(results) ? results[0] : null;
          const latitude = Number(first?.lat);
          const longitude = Number(first?.lon);
          if (Number.isFinite(latitude) && Number.isFinite(longitude)) {
            geocodeCache[cacheKey] = { latitude, longitude };
            saveGeocodeCache();
            return geocodeCache[cacheKey];
          }
        } catch {
          return null;
        }

        return null;
      }

      function hashPoint(text, index) {
        const rect = mapEl.getBoundingClientRect();
        let hash = 0;
        const source = `${text || "gent"}-${index}`;
        for (let i = 0; i < source.length; i += 1) hash = ((hash << 5) - hash) + source.charCodeAt(i);
        const angle = Math.abs(hash % 360) * Math.PI / 180;
        const radius = Math.min(rect.width, rect.height) * (0.18 + Math.abs(hash % 24) / 100);
        return {
          x: Math.max(28, Math.min(rect.width - 28, rect.width / 2 + Math.cos(angle) * radius)),
          y: Math.max(46, Math.min(rect.height - 28, rect.height / 2 + Math.sin(angle) * radius))
        };
      }

      function latLngPoint(lat, lng) {
        const rect = mapEl.getBoundingClientRect();
        const centerX = lonToTileX(shop.lng, mapZoom);
        const centerY = latToTileY(shop.lat, mapZoom);
        const pointX = lonToTileX(lng, mapZoom);
        const pointY = latToTileY(lat, mapZoom);
        return {
          x: Math.max(28, Math.min(rect.width - 28, rect.width / 2 + (pointX - centerX) * 256)),
          y: Math.max(46, Math.min(rect.height - 28, rect.height / 2 + (pointY - centerY) * 256))
        };
      }

      async function pointForOrder(record, index) {
        const c = customer(record);
        const lat = Number(c.latitude || c.lat || record.latitude || record.lat);
        const lng = Number(c.longitude || c.lng || record.longitude || record.lng);
        if (Number.isFinite(lat) && Number.isFinite(lng)) return latLngPoint(lat, lng);
        const geocoded = await geocodeAddress(orderAddress(record));
        if (geocoded) return latLngPoint(geocoded.latitude, geocoded.longitude);
        return hashPoint(orderAddress(record), index);
      }

      function addPin({ point, color, label, className = "" }) {
        const pin = document.createElement("div");
        pin.className = `pin ${className}`;
        pin.style.setProperty("--x", `${point.x}px`);
        pin.style.setProperty("--y", `${point.y}px`);
        pin.style.setProperty("--pin", color);
        pin.innerHTML = `<span class="pin-dot"></span><span class="pin-label">${escapeHtml(label)}</span>`;
        mapEl.appendChild(pin);
      }

      async function renderMap() {
        renderTiles();
        mapEl.querySelectorAll(".pin").forEach((pin) => pin.remove());
        const activeOrders = orders.filter((record) => activeStatuses.includes(record.status));
        const activeDriverIds = new Set(
          activeOrders
            .filter((record) => record.status === "Onderweg" && record.driverId)
            .map((record) => String(record.driverId))
        );

        for (const [index, record] of activeOrders.entries()) {
          addPin({
            point: await pointForOrder(record, index),
            color: statusColors[record.status] || "var(--new)",
            label: `${orderNumber(record)} - ${record.status}`
          });
        }

        Object.values(locations || {})
          .filter((location) => activeDriverIds.has(String(location.driverId)))
          .forEach((location) => {
          const lat = Number(location.latitude);
          const lng = Number(location.longitude);
          if (!Number.isFinite(lat) || !Number.isFinite(lng)) return;
          addPin({
            point: latLngPoint(lat, lng),
            color: "var(--driver)",
            label: location.driverName || "Chauffeur",
            className: "driver-pin"
          });
        });

        summaryEl.textContent = `${activeOrders.length} actieve leveringen - ${activeDriverIds.size} chauffeurs onderweg`;
      }

      async function loadMap() {
        try {
          errorEl.textContent = "";
          const [orderData, driverData] = await Promise.all([
            api("/api/orders"),
            api("/api/drivers")
          ]);
          orders = Array.isArray(orderData.orders) ? orderData.orders : [];
          locations = driverData.locations || {};
          loginPanel.classList.add("hidden");
          mapEl.classList.remove("hidden");
          await renderMap();
        } catch (error) {
          errorEl.textContent = error.message;
          loginPanel.classList.remove("hidden");
          mapEl.classList.add("hidden");
        }
      }

      document.querySelector("#saveSecretButton").addEventListener("click", () => {
        const secret = secretInput.value.trim();
        if (!secret) return;
        setSecret(secret);
        loadMap();
      });

      document.querySelector("#refreshButton").addEventListener("click", loadMap);
      zoomInButton.addEventListener("click", () => {
        mapZoom = Math.min(18, mapZoom + 1);
        localStorage.setItem("loadedMapZoom", String(mapZoom));
        renderMap();
      });
      zoomOutButton.addEventListener("click", () => {
        mapZoom = Math.max(12, mapZoom - 1);
        localStorage.setItem("loadedMapZoom", String(mapZoom));
        renderMap();
      });

      if (getSecret()) {
        secretInput.value = getSecret();
        loadMap();
      }

      setInterval(() => {
        if (getSecret()) loadMap();
      }, 10000);

      window.addEventListener("resize", () => {
        if (!mapEl.classList.contains("hidden")) renderMap();
      });
    </script>
  </body>
</html>
