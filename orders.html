<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loaded Bowls Orders</title>
    <style>
      :root {
        --navy: #07111d;
        --panel: #101b2b;
        --gold: #f3b332;
        --orange: #f28a2d;
        --text: #fff5df;
        --muted: #c9bb9e;
        --line: rgba(243, 179, 50, 0.2);
        --ok: #55d889;
        --danger: #ff6b5c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          radial-gradient(circle at 90% 5%, rgba(243,179,50,0.16), transparent 28rem),
          var(--navy);
        font-family: Arial, Helvetica, sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        width: min(100% - 28px, 1180px);
        margin: 0 auto;
        padding: 22px 0 40px;
      }

      .top {
        position: sticky;
        top: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 16px 0;
        background: rgba(7, 17, 29, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--line);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 7vw, 4.2rem);
        line-height: 0.92;
        text-transform: uppercase;
      }

      h1 span,
      h2 span {
        color: var(--gold);
      }

      .status {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 12px;
        color: var(--muted);
        background: rgba(255,255,255,0.04);
        font-weight: 800;
      }

      .pill.ok {
        color: var(--ok);
      }

      .login,
      .toolbar,
      .empty,
      .order {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(243,179,50,0.08), rgba(255,255,255,0.02)), var(--panel);
        box-shadow: 0 18px 40px rgba(0,0,0,0.22);
      }

      .login {
        display: grid;
        gap: 14px;
        max-width: 520px;
        margin: 60px auto;
        padding: 24px;
      }

      .login input {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 14px;
        color: var(--text);
        background: rgba(255,255,255,0.05);
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 13px 16px;
        color: #07111d;
        background: var(--gold);
        font-weight: 950;
        text-transform: uppercase;
      }

      .btn.secondary {
        border: 1px solid var(--line);
        color: var(--text);
        background: rgba(255,255,255,0.04);
      }

      .btn.danger {
        background: var(--danger);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin: 20px 0;
        padding: 14px;
      }

      .daybar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .daybar strong {
        min-width: 180px;
        text-align: center;
        color: var(--gold);
        font-size: 1.05rem;
        text-transform: uppercase;
      }

      .orders {
        display: grid;
        gap: 16px;
      }

      .empty {
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      .order {
        padding: 18px;
        display: grid;
        gap: 16px;
      }

      .order-head {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: start;
      }

      .order h2 {
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        line-height: 1;
        text-transform: uppercase;
      }

      .order-meta,
      .items,
      .customer {
        display: grid;
        gap: 8px;
      }

      .customer {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field,
      .item {
        border-bottom: 1px solid rgba(243,179,50,0.14);
        padding-bottom: 8px;
      }

      .field strong,
      .item strong {
        color: var(--gold);
      }

      .muted,
      .details {
        color: var(--muted);
      }

      .details {
        margin-top: 4px;
        line-height: 1.35;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .actions select {
        min-width: 170px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        color: var(--text);
        background: #0a1524;
      }

      .total {
        color: var(--orange);
        font-size: 1.8rem;
        font-weight: 950;
        text-align: right;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 720px) {
        .top,
        .order-head,
        .customer {
          grid-template-columns: 1fr;
        }

        .status,
        .total {
          justify-content: flex-start;
          text-align: left;
        }

        .btn,
        .actions select {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div>
          <h1>Loaded <span>Orders</span></h1>
          <p class="muted">Privé overzicht voor betaalde bestellingen.</p>
        </div>
        <div class="status">
          <span class="pill" id="connectionStatus">Niet verbonden</span>
          <span class="pill" id="orderCount">0 orders</span>
        </div>
      </header>

      <section class="login" id="loginPanel">
        <h2>Toegangscode</h2>
        <p class="muted">Vul jullie geheime ordercode in. Die blijft enkel op deze iPad bewaard.</p>
        <input id="secretInput" type="password" autocomplete="current-password" placeholder="Ordercode">
        <button class="btn" id="saveSecretButton" type="button">Orders openen</button>
      </section>

      <section class="hidden" id="ordersPanel">
        <div class="toolbar">
          <div class="actions">
            <button class="btn" id="enableSoundButton" type="button">Geluid aanzetten</button>
            <button class="btn secondary" id="refreshButton" type="button">Vernieuwen</button>
            <button class="btn secondary" id="logoutButton" type="button">Code wissen</button>
          </div>
          <div class="daybar">
            <button class="btn secondary" id="previousDayButton" type="button">Vorige dag</button>
            <strong id="selectedDayLabel">Vandaag</strong>
            <button class="btn secondary" id="nextDayButton" type="button">Volgende dag</button>
          </div>
          <p class="muted" id="lastUpdated">Nog niet vernieuwd</p>
        </div>
        <div class="orders" id="orders"></div>
      </section>
    </main>

    <script>
      const loginPanel = document.querySelector("#loginPanel");
      const ordersPanel = document.querySelector("#ordersPanel");
      const secretInput = document.querySelector("#secretInput");
      const saveSecretButton = document.querySelector("#saveSecretButton");
      const enableSoundButton = document.querySelector("#enableSoundButton");
      const refreshButton = document.querySelector("#refreshButton");
      const logoutButton = document.querySelector("#logoutButton");
      const previousDayButton = document.querySelector("#previousDayButton");
      const nextDayButton = document.querySelector("#nextDayButton");
      const selectedDayLabel = document.querySelector("#selectedDayLabel");
      const ordersEl = document.querySelector("#orders");
      const connectionStatus = document.querySelector("#connectionStatus");
      const orderCount = document.querySelector("#orderCount");
      const lastUpdated = document.querySelector("#lastUpdated");

      const statuses = ["Nieuw", "In bereiding", "Klaar", "Afgehaald", "Geleverd", "Geannuleerd"];
      const money = new Intl.NumberFormat("nl-BE", { style: "currency", currency: "EUR" });
      let audioContext = null;
      let knownIds = new Set(JSON.parse(localStorage.getItem("loadedKnownOrderIds") || "[]"));
      let selectedDay = new Date();

      function dateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function addDays(date, amount) {
        const next = new Date(date);
        next.setDate(next.getDate() + amount);
        return next;
      }

      function getOrderDate(record) {
        return new Date(record.createdAt || record.paidAt || Date.now());
      }

      function updateDayLabel() {
        const todayKey = dateKey(new Date());
        const selectedKey = dateKey(selectedDay);
        selectedDayLabel.textContent = selectedKey === todayKey
          ? "Vandaag"
          : selectedDay.toLocaleDateString("nl-BE", { weekday: "long", day: "2-digit", month: "2-digit" });
      }

      function getSecret() {
        return localStorage.getItem("loadedOrdersSecret") || "";
      }

      function setConnected(ok, text) {
        connectionStatus.textContent = text;
        connectionStatus.classList.toggle("ok", ok);
      }

      function beep() {
        if (!audioContext) return;
        const now = audioContext.currentTime;
        [0, 0.22, 0.44].forEach((delay) => {
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(880, now + delay);
          gain.gain.setValueAtTime(0.0001, now + delay);
          gain.gain.exponentialRampToValueAtTime(0.2, now + delay + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.16);
          osc.connect(gain).connect(audioContext.destination);
          osc.start(now + delay);
          osc.stop(now + delay + 0.18);
        });
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Date(value).toLocaleString("nl-BE", {
          day: "2-digit",
          month: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function formatTime(value) {
        if (!value) return "-";
        return new Date(value).toLocaleTimeString("nl-BE", {
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function itemTotal(item) {
        return Number(item.price || 0) * Number(item.quantity || 1);
      }

      function renderOrders(orders) {
        updateDayLabel();
        const selectedKey = dateKey(selectedDay);
        const filteredOrders = orders.filter((record) => dateKey(getOrderDate(record)) === selectedKey);
        orderCount.textContent = `${filteredOrders.length} orders`;

        if (!filteredOrders.length) {
          ordersEl.innerHTML = `<div class="empty">Geen orders voor deze dag.</div>`;
          return;
        }

        ordersEl.innerHTML = filteredOrders.map((record) => {
          const order = record.order || {};
          const customer = order.customer || {};
          const items = Array.isArray(order.items) ? order.items : [];
          const total = Number(order.total || record.amount?.value || 0);
          const createdAt = record.createdAt || record.paidAt;
          const statusOptions = statuses.map((status) => `<option value="${status}" ${record.status === status ? "selected" : ""}>${status}</option>`).join("");
          const itemHtml = items.map((item) => `
            <div class="item">
              <strong>${item.quantity || 1}x ${item.name || "Item"}</strong>
              <span>${money.format(itemTotal(item))}</span>
              ${item.details ? `<div class="details">${item.details}</div>` : ""}
            </div>
          `).join("");

          return `
            <article class="order" data-id="${record.id}">
              <div class="order-head">
                <div>
                  <h2>${customer.method || "Order"} <span>${customer.orderTime || ""}</span></h2>
                  <p class="muted">Binnengekomen: ${formatDate(createdAt)} om ${formatTime(createdAt)} - ${record.paymentLabel || "Order"} - ${record.id}</p>
                </div>
                <div class="total">${money.format(total)}</div>
              </div>
              <div class="customer">
                <div class="field"><strong>Naam</strong><br>${customer.name || "-"}</div>
                <div class="field"><strong>Telefoon</strong><br>${customer.phone || "-"}</div>
                <div class="field"><strong>Keuze</strong><br>${customer.method || "-"}</div>
                <div class="field"><strong>Uur</strong><br>${customer.orderTime || "-"}</div>
                ${customer.address ? `<div class="field"><strong>Adres</strong><br>${customer.address}</div>` : ""}
                ${customer.note ? `<div class="field"><strong>Opmerking</strong><br>${customer.note}</div>` : ""}
              </div>
              <div class="items">${itemHtml}</div>
              <div class="actions">
                <select data-status>
                  ${statusOptions}
                </select>
                <button class="btn secondary" data-print type="button">Print ticket</button>
              </div>
            </article>
          `;
        }).join("");
      }

      async function loadOrders() {
        const secret = getSecret();
        if (!secret) return;

        try {
          const response = await fetch("/api/orders", {
            headers: {
              "X-Admin-Secret": secret
            }
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Orders laden mislukt.");

          const orders = data.orders || [];
          const incoming = orders.filter((order) => !knownIds.has(order.id));
          if (knownIds.size && incoming.length) beep();
          orders.forEach((order) => knownIds.add(order.id));
          localStorage.setItem("loadedKnownOrderIds", JSON.stringify([...knownIds].slice(-200)));

          renderOrders(orders);
          setConnected(true, "Verbonden");
          lastUpdated.textContent = `Laatst vernieuwd: ${new Date().toLocaleTimeString("nl-BE", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
        } catch (error) {
          setConnected(false, "Fout");
          ordersEl.innerHTML = `<div class="empty">${error.message}</div>`;
        }
      }

      async function updateStatus(id, status) {
        const response = await fetch("/api/orders", {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            "X-Admin-Secret": getSecret()
          },
          body: JSON.stringify({ id, status })
        });
        const data = await response.json();
        if (!response.ok) alert(data.error || "Status aanpassen mislukt.");
        await loadOrders();
      }

      function textFrom(article, selector) {
        return article.querySelector(selector)?.textContent.trim() || "";
      }

      function printOrder(article) {
        const title = textFrom(article, "h2");
        const meta = textFrom(article, ".muted");
        const total = textFrom(article, ".total");
        const fields = [...article.querySelectorAll(".field")].map((field) => field.innerHTML);
        const items = [...article.querySelectorAll(".item")].map((item) => item.innerHTML);
        const html = `
          <html>
            <head>
              <title>Loaded Bowls ticket</title>
              <style>
                @page { size: 80mm auto; margin: 4mm; }
                * { box-sizing: border-box; }
                body {
                  width: 72mm;
                  margin: 0;
                  padding: 0;
                  color: #000;
                  background: #fff;
                  font-family: Arial, sans-serif;
                  font-size: 12px;
                }
                h1 {
                  margin: 0 0 6px;
                  text-align: center;
                  font-size: 22px;
                  font-weight: 900;
                  letter-spacing: 0.04em;
                }
                h2 {
                  margin: 8px 0;
                  font-size: 18px;
                  font-weight: 900;
                  text-transform: uppercase;
                }
                .center { text-align: center; }
                .muted { color: #222; font-size: 11px; line-height: 1.35; }
                .line { border-top: 1px dashed #000; margin: 9px 0; }
                .field, .item {
                  border-bottom: 1px dashed #999;
                  padding: 7px 0;
                  line-height: 1.35;
                  word-break: break-word;
                }
                .field strong,
                .item strong {
                  display: block;
                  font-size: 13px;
                  text-transform: uppercase;
                }
                .details {
                  display: block;
                  margin-top: 4px;
                  font-size: 11px;
                }
                .total {
                  margin: 12px 0 4px;
                  text-align: right;
                  font-size: 22px;
                  font-weight: 900;
                }
              </style>
            </head>
            <body>
              <h1>LOADED BOWLS</h1>
              <div class="center muted">Sint-Amandstraat 24, Gent</div>
              <div class="line"></div>
              <h2>${title}</h2>
              <div class="muted">${meta}</div>
              <div class="line"></div>
              ${fields.map((field) => `<div class="field">${field}</div>`).join("")}
              <div class="line"></div>
              ${items.map((item) => `<div class="item">${item}</div>`).join("")}
              <div class="total">${total}</div>
              <div class="line"></div>
              <div class="center">Dank u!</div>
              <script>window.onload = () => window.print();<\/script>
            </body>
          </html>
        `;
        const printWindow = window.open("", "_blank");
        printWindow.document.write(html);
        printWindow.document.close();
      }

      saveSecretButton.addEventListener("click", () => {
        const secret = secretInput.value.trim();
        if (!secret) return;
        localStorage.setItem("loadedOrdersSecret", secret);
        loginPanel.classList.add("hidden");
        ordersPanel.classList.remove("hidden");
        loadOrders();
      });

      enableSoundButton.addEventListener("click", async () => {
        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        await audioContext.resume();
        beep();
        enableSoundButton.textContent = "Geluid staat aan";
      });

      refreshButton.addEventListener("click", loadOrders);
      previousDayButton.addEventListener("click", () => {
        selectedDay = addDays(selectedDay, -1);
        loadOrders();
      });
      nextDayButton.addEventListener("click", () => {
        selectedDay = addDays(selectedDay, 1);
        loadOrders();
      });
      logoutButton.addEventListener("click", () => {
        localStorage.removeItem("loadedOrdersSecret");
        location.reload();
      });

      ordersEl.addEventListener("change", (event) => {
        if (!event.target.matches("[data-status]")) return;
        const article = event.target.closest(".order");
        updateStatus(article.dataset.id, event.target.value);
      });

      ordersEl.addEventListener("click", (event) => {
        if (!event.target.matches("[data-print]")) return;
        printOrder(event.target.closest(".order"));
      });

      if (getSecret()) {
        loginPanel.classList.add("hidden");
        ordersPanel.classList.remove("hidden");
        loadOrders();
      }

      window.setInterval(loadOrders, 8000);
    </script>
  </body>
</html>
